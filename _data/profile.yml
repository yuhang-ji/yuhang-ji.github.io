short_bio: >-
  <p style="text-align: justify; text-justify: inter-word;">
    I am a Ph.D. candidate in Management Science at the School of Management, Fudan University, advised by Professor <a href="https://www.fdsm.fudan.edu.cn/En/2025/1021/c1037a24024/page.htm" target="_blank" rel="noopener noreferrer">Tianjun Feng</a>. I am currently visiting the OPIM Department at the University of Connecticut School of Business.
  </p>

  <p style="text-align: justify; text-justify: inter-word;">
    My research interests lie in platform economics, personalized pricing, and data-driven business models, with a particular focus on consumer privacy, digital regulation, and advertising-based in generative AI platforms.
  </p>

     

